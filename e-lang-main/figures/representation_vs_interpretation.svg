<svg xmlns="http://www.w3.org/2000/svg" width="700" height="250">
  <rect width="100%" height="100%" fill="white"/>

  <rect x="50" y="80" width="200" height="80" stroke="black" fill="none"/>
  <text x="150" y="125" text-anchor="middle">Representation (E-Lang)</text>

  <rect x="450" y="80" width="200" height="80" stroke="black" fill="none"/>
  <text x="550" y="125" text-anchor="middle">Interpretation (Optional)</text>

  <line x1="250" y1="120" x2="450" y2="120" stroke="black" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="black"/>
    </marker>
  </defs>
</svg>