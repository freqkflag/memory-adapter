name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      
      - name: Run markdownlint
        run: |
          echo "Linting all markdown files with .markdownlint.json configuration..."
          markdownlint '**/*.md' --config .markdownlint.json || {
            echo "::error::Markdown linting failed. Fix formatting issues and try again."
            exit 1
          }
        continue-on-error: false

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run pytest
        run: |
          echo "Running parser test suite..."
          pytest tests/ -v --tb=short || {
            echo "::error::Test suite failed. Check parser implementation and test fixtures."
            exit 1
          }
        continue-on-error: false