tunnel: <existing-tunnel-id>
credentials-file: /etc/cloudflared/<existing-tunnel-id>.json

ingress:
  # Case A: tunnel already forwards traffic to Traefik catch-all.
  # Keep that existing rule and only add the Traefik Host router for PAM.
  # Example existing rule:
  # - service: http://<traefik-host-or-ip>:80
  #   originRequest:
  #     noTLSVerify: true

  # Case B: explicit hostname ingress routing.
  - hostname: pam.cultofjoey.com
    service: http://<traefik-host-or-ip>:80

  # Keep fallback last.
  - service: http_status:404
