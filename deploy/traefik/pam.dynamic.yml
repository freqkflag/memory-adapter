http:
  routers:
    pam_public_router:
      rule: Host(`pam.cultofjoey.com`)
      entryPoints:
        - websecure
      service: pam_backend_service
      tls: true

  services:
    pam_backend_service:
      loadBalancer:
        servers:
          # Set this to the target reachable FROM the Traefik host.
          #
          # If Traefik and PAM are on the same host namespace:
          # - url: "http://127.0.0.1:3000"
          #
          # If Traefik is on a different host from PAM (common homelab case):
          # - url: "http://192.168.12.105:3000"
          # or internal DNS:
          # - url: "http://pam-vm.internal:3000"
          #
          # Keep exactly one active backend URL:
          - url: "http://192.168.12.105:3000"

# Notes:
# - Use this file with Traefik file-provider dynamic config.
# - Router name and service name are explicit to reduce accidental collisions.
# - If Traefik runs elsewhere, do not use localhost for PAM backend.
